components:
  schemas:
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fullname:
          type: string
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum:
          - USER
          - ADMIN
          - RESTAURANT
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MenuItemRequest:
      required:
      - categoryId
      - name
      - price
      type: object
      properties:
        categoryId:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        isAvailable:
          type: boolean
    MenuItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        isAvailable:
          type: boolean
    CartItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        menuItemId:
          type: integer
          format: int64
        itemName:
          type: string
        imageUrl:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
        totalPrice:
          type: number
    CartResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerId:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemResponse"
        totalAmount:
          type: number
    UserRequest:
      required:
      - email
      - fullname
      - password
      - phone
      - username
      type: object
      properties:
        fullname:
          maxLength: 100
          minLength: 3
          type: string
        username:
          maxLength: 50
          minLength: 3
          type: string
        email:
          type: string
        phone:
          type: string
        password:
          maxLength: 100
          minLength: 6
          type: string
        role:
          type: string
          enum:
          - USER
          - ADMIN
          - RESTAURANT
    ReviewRequest:
      required:
      - orderId
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        restaurantId:
          type: integer
          format: int64
        menuItemId:
          type: integer
          format: int64
        rating:
          maximum: 5
          minimum: 1
          type: integer
          format: int32
        comment:
          type: string
    ReviewResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        restaurantId:
          type: integer
          format: int64
        restaurantName:
          type: string
        customerId:
          type: integer
          format: int64
        customerName:
          type: string
        rating:
          type: integer
          format: int32
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
    PaymentRequest:
      required:
      - method
      - orderId
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        method:
          type: string
          enum:
          - COD
          - VNPAY
          - MOMO
    PaymentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        transactionId:
          type: string
        method:
          type: string
        amount:
          type: number
        status:
          type: string
        paymentUrl:
          type: string
        createdAt:
          type: string
          format: date-time
    OrderRequest:
      required:
      - deliveryAddress
      - restaurantId
      type: object
      properties:
        restaurantId:
          type: integer
          format: int64
        deliveryAddress:
          type: string
        customerNote:
          type: string
    OrderItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        menuItemId:
          type: integer
          format: int64
        itemName:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerId:
          type: integer
          format: int64
        customerName:
          type: string
        customerEmail:
          type: string
        restaurantId:
          type: integer
          format: int64
        restaurantName:
          type: string
        totalAmount:
          type: number
        deliveryFee:
          type: number
        status:
          type: string
        deliveryAddress:
          type: string
        customerNote:
