version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: duckie-rabbitmq-v2
    ports:
      - "5673:5672"   
      - "15673:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  mysql-db:
    image: mysql:8.0
    container_name: duckie-mysql
    environment:
      MYSQL_DATABASE: duckie_food_db
      MYSQL_ROOT_PASSWORD: admin123@ 
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: duckie-backend
    depends_on:
      - rabbitmq
      - mysql-db
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - SPRING_PROFILES_ACTIVE=dev-mysql
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/duckie_food_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
      - SPRING_SQL_INIT_MODE=always
      - SPRING_SQL_INIT_DATA_LOCATIONS=classpath:data.sql
      - SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION=true
    ports:
      - "8081:8080"

  frontend:
    build: ./frontend
    container_name: duckie-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data: